<div class="formulario-wrapper">
  <div class="form-content w-full flex justify-center p-4">
    <div class="w-full max-w-3xl p-10 rounded-[40px] bg-black/60 border border-purple-500/30 backdrop-blur-2xl shadow-2xl shadow-purple-500/10">

      <div class="text-center mb-10">
        <h2 class="text-4xl md:text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white via-purple-400 to-cyan-400 uppercase italic leading-tight">
          Subir de Nivel
        </h2>
        <p class="text-gray-400 mt-3 text-xs tracking-[0.3em] uppercase font-bold">
          Selecciona tu membresía interestelar
        </p>
      </div>

      <form #planForm="ngForm" class="space-y-10">
        
        <div class="space-y-4">
          <label class="block text-[10px] font-black text-purple-400 uppercase tracking-[0.2em] ml-2 mb-4">Plan Seleccionado</label>
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div (click)="planSeleccionado = 'Gratuito'" 
                 [class.active-plan]="planSeleccionado === 'Gratuito'"
                 class="plan-card">
              <span class="plan-price">$0</span>
              <h3 class="plan-title">Gratuito</h3>
              <p class="plan-desc">Básico</p>
            </div>

            <div (click)="planSeleccionado = 'Premium'" 
                 [class.active-plan]="planSeleccionado === 'Premium'"
                 class="plan-card">
              <div class="badge">TOP</div>
              <span class="plan-price">$9.99</span>
              <h3 class="plan-title">Premium</h3>
              <p class="plan-desc">HD + No Ads</p>
            </div>

            <div (click)="planSeleccionado = 'Familiar'" 
                 [class.active-plan]="planSeleccionado === 'Familiar'"
                 class="plan-card">
              <span class="plan-price">$14.99</span>
              <h3 class="plan-title">Familiar</h3>
              <p class="plan-desc">6 Cuentas</p>
            </div>
          </div>
        </div>

        <div class="relative overflow-hidden p-8 bg-gradient-to-br from-gray-900 to-black rounded-[30px] border border-white/10 shadow-inner">
          <div class="absolute top-0 right-0 p-6 opacity-20">
            <svg width="60" height="40" viewBox="0 0 48 32"><path fill="#fff" d="M14 0H0v32h14V0zM31 0H17v32h14V0zM48 0H34v32h14V0z"/></svg>
          </div>
          
          <label class="block text-xs font-bold text-cyan-400 uppercase tracking-widest mb-6">Método de Pago</label>
          
          <div class="space-y-6">
            <div class="space-y-2">
              <span class="text-[10px] text-gray-500 uppercase font-bold ml-1">Número de Tarjeta</span>
              <input type="text" placeholder="**** **** **** 4242" 
                class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-xl text-white font-mono tracking-widest focus:outline-none focus:border-purple-500 transition-all">
            </div>
            
            <div class="grid grid-cols-2 gap-6">
              <div class="space-y-2">
                <span class="text-[10px] text-gray-500 uppercase font-bold ml-1">Expiración</span>
                <input type="text" placeholder="MM/YY" 
                  class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:border-purple-500">
              </div>
              <div class="space-y-2">
                <span class="text-[10px] text-gray-500 uppercase font-bold ml-1">CVC</span>
                <input type="password" placeholder="***" 
                  class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:border-purple-500">
              </div>
            </div>
          </div>
        </div>

        <div class="pt-4">
          <button type="button" (click)="contratarAhora()"
            class="w-full py-6 bg-gradient-to-r from-purple-600 via-indigo-600 to-cyan-500 text-white font-black uppercase tracking-[0.4em] rounded-2xl shadow-[0_0_30px_rgba(168,85,247,0.4)] hover:shadow-[0_0_60px_rgba(168,85,247,0.7)] hover:scale-[1.02] active:scale-95 transition-all duration-300">
            CONFIRMAR SUSCRIPCIÓN
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
